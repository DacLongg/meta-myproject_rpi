#@TYPE: Machine
#@NAME: DarkDragon Raspberry Pi 3 Custom Board
#@DESCRIPTION: Custom board profile derived from Raspberry Pi 3 hardware support.
#
# This machine keeps the low-level Raspberry Pi BSP include because boot firmware,
# device tree, kernel wiring, and SD image layout are board-specific. Project
# policy and installed runtime packages should live in this layer.

DEFAULTTUNE ?= "cortexa7thf-neon-vfpv4"
require conf/machine/include/arm/armv7a/tune-cortexa7.inc
include conf/machine/include/rpi-base.inc

MACHINEOVERRIDES =. "raspberrypi3:"

MACHINE_EXTRA_RRECOMMENDS += " \
    linux-firmware-rpidistro-bcm43430 \
    linux-firmware-rpidistro-bcm43455 \
    bluez-firmware-rpidistro-bcm43430a1-hcd \
    bluez-firmware-rpidistro-bcm4345c0-hcd \
"

SDIMG_KERNELIMAGE ?= "kernel7.img"
UBOOT_MACHINE = "rpi_3_32b_config"
SERIAL_CONSOLES ?= "115200;ttyS0"

VC4DTBO ?= "vc4-fkms-v3d"
ARMSTUB ?= "armstub7.bin"
