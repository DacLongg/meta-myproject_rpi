# Custom machine for a Raspberry Pi based board.
# Start from the closest upstream Raspberry Pi machine and override only the
# board-specific parts here.
require conf/machine/raspberrypi3.conf

MACHINEOVERRIDES =. "myproject-rpi:raspberrypi3:"

# Keep UART enabled for bring-up and serial boot debugging.
ENABLE_UART = "1"

# Reuse the Raspberry Pi 3 kernel defconfig until a board-specific kernel
# fragment/defconfig is introduced.
KBUILD_DEFCONFIG = "bcm2709_defconfig"

# Replace this with your custom DTB once it is added to the kernel build.
# This must be the deployed DTB name, not a source-tree path.
RPI_KERNEL_DEVICETREE = "bcm2710-rpi-3-b.dtb"
